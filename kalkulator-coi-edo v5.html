<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator COI i EDO | FBO – marciniwuc.com</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow-x: hidden; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .tooltip-wrap:hover .tooltip-box,
    .tooltip-wrap:focus-within .tooltip-box { display: block !important; }
    .tooltip-box::after {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
    }
    .tooltip-box:not(.tooltip-down)::after {
      top: 100%;
      border-top-color: #1a2e4a;
    }
    .tooltip-down::after {
      bottom: 100%;
      top: auto;
      border-bottom-color: #1a2e4a;
    }
    a { transition: background 0.2s; }
    button { transition: all 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    input:focus { border-color: #e8590c !important; box-shadow: 0 0 0 4px rgba(232,89,12,0.12) !important; }
    @media (max-width: 480px) {
      .tooltip-box { left: -20px !important; transform: none !important; width: 200px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

// ============================================================
// FINANCIAL CONSTANTS – Kwiecień 2026
// ============================================================
const CURRENT_INFLATION = 0.05;

const COI = {
  name: "COI (4-letnie)",
  shortName: "COI",
  maturityYears: 4,
  firstYearRate: 0.0475,
  margin: 0.015,
  earlyRedemptionFee: 2.0,
  conversionPrice: 99.9,
  icon: "📘",
  color: "blue",
};

const EDO = {
  name: "EDO (10-letnie)",
  shortName: "EDO",
  maturityYears: 10,
  firstYearRate: 0.0535,
  margin: 0.02,
  earlyRedemptionFee: 3.0,
  conversionPrice: 99.9,
  icon: "📗",
  color: "green",
};

const BELKA_TAX = 0.19;
const BOND_FACE_VALUE = 100;

// ============================================================
// HELPERS
// ============================================================
function fmt(num) {
  return new Intl.NumberFormat("pl-PL", { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num) + " zł";
}
function fmtRounded(num) {
  return new Intl.NumberFormat("pl-PL", { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Math.round(num)) + " zł";
}
function fmtShort(num) {
  return new Intl.NumberFormat("pl-PL", { minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(num) + " zł";
}
function fmtPct(rate) {
  return (rate * 100).toFixed(2).replace(".", ",") + "%";
}
function yearsLabel(y) {
  if (y === 1) return "1 rok";
  if (y < 5) return y + " lata";
  return y + " lat";
}
function buyBonds(cash, pricePerBond) {
  const bonds = Math.floor(cash / pricePerBond);
  const spent = bonds * pricePerBond;
  const leftover = cash - spent;
  return { bonds, spent, leftover };
}

// ============================================================
// FINANCIAL ENGINE
// ============================================================
function calcCOISingle(bonds, yearsInSeries, inflation) {
  const nominalCapital = bonds * BOND_FACE_VALUE;
  const effectiveYears = Math.min(yearsInSeries, COI.maturityYears);
  const earlyRedemption = yearsInSeries < COI.maturityYears;

  const annualBreakdown = [];
  for (let y = 1; y <= effectiveYears; y++) {
    const rate = y === 1 ? COI.firstYearRate : inflation + COI.margin;
    const grossInterest = nominalCapital * rate;
    let redemptionFee = 0;
    let netInterest = 0;
    if (earlyRedemption && y === effectiveYears) {
      const maxFee = bonds * COI.earlyRedemptionFee;
      redemptionFee = Math.min(maxFee, grossInterest);
      const adjustedGross = grossInterest - redemptionFee;
      netInterest = adjustedGross > 0 ? adjustedGross * (1 - BELKA_TAX) : 0;
    } else {
      netInterest = grossInterest * (1 - BELKA_TAX);
    }
    annualBreakdown.push({ year: y, rate, grossInterest, netInterest, redemptionFee });
  }

  const totalRedemptionFee = annualBreakdown.reduce((s, r) => s + r.redemptionFee, 0);
  const totalNetInterest = annualBreakdown.reduce((s, r) => s + r.netInterest, 0);
  const lastYearNet = annualBreakdown[annualBreakdown.length - 1].netInterest;
  const cashFromBonds = nominalCapital + lastYearNet;

  return { bonds, nominalCapital, cashFromBonds, totalNetInterest, totalRedemptionFee, earlyRedemption, annualBreakdown, startCapital: nominalCapital, seriesNum: 0, yearsInSeries };
}

function calcCOI(investment, years, inflation) {
  const seriesList = [];
  let remainingYears = years;
  const firstBuy = buyBonds(investment, BOND_FACE_VALUE);
  let activeBonds = firstBuy.bonds;
  let cashOnAccount = firstBuy.leftover;
  const annualBreakdown = [];
  let globalYear = 1;
  let seriesNum = 0;

  while (remainingYears > 0) {
    seriesNum++;
    const yearsInSeries = Math.min(remainingYears, COI.maturityYears);
    const result = calcCOISingle(activeBonds, yearsInSeries, inflation);
    result.seriesNum = seriesNum;

    const breakdown = result.annualBreakdown;
    for (let y = 0; y < breakdown.length; y++) {
      const r = breakdown[y];
      const isLastYearOfSeries = y === breakdown.length - 1;
      const paidToCashNow = isLastYearOfSeries ? 0 : r.netInterest;
      annualBreakdown.push({ year: globalYear++, rate: r.rate, grossInterest: r.grossInterest, netInterest: r.netInterest, redemptionFee: r.redemptionFee, paidToCash: paidToCashNow, seriesNum, isFirstInSeries: y === 0, startCapital: result.nominalCapital });
      if (!isLastYearOfSeries) cashOnAccount += r.netInterest;
    }

    seriesList.push({ ...result });
    remainingYears -= yearsInSeries;

    if (remainingYears > 0) {
      const rollFromRedemption = buyBonds(result.cashFromBonds, COI.conversionPrice);
      cashOnAccount += rollFromRedemption.leftover;
      const rollFromAccount = buyBonds(cashOnAccount, BOND_FACE_VALUE);
      activeBonds = rollFromRedemption.bonds + rollFromAccount.bonds;
      cashOnAccount = rollFromAccount.leftover;
    } else {
      cashOnAccount += result.cashFromBonds;
    }
  }

  const finalAmount = cashOnAccount;
  const netProfit = finalAmount - investment;
  const totalRedemptionFee = seriesList.reduce((s, r) => s + r.totalRedemptionFee, 0);
  const earlyRedemption = seriesList[seriesList.length - 1].earlyRedemption;
  return { product: COI, investment, years, earlyRedemption, redemptionFee: totalRedemptionFee, finalAmount, netProfit, annualBreakdown, seriesList, inflationUsed: inflation };
}

function calcEDOSingle(bonds, yearsInSeries, inflation) {
  const nominalCapital = bonds * BOND_FACE_VALUE;
  const effectiveYears = Math.min(yearsInSeries, EDO.maturityYears);
  const earlyRedemption = yearsInSeries < EDO.maturityYears;

  let cap = nominalCapital;
  const annualBreakdown = [];
  for (let y = 1; y <= effectiveYears; y++) {
    const rate = y === 1 ? EDO.firstYearRate : inflation + EDO.margin;
    const grossInterest = cap * rate;
    cap += grossInterest;
    annualBreakdown.push({ year: y, rate, capitalStart: cap - grossInterest, grossInterest, capitalEnd: cap });
  }

  const grossProfit = cap - nominalCapital;
  let redemptionFee = 0;
  let netProfit = 0;
  if (earlyRedemption) {
    const maxFee = bonds * EDO.earlyRedemptionFee;
    redemptionFee = Math.min(maxFee, grossProfit);
    const adjustedGross = grossProfit - redemptionFee;
    netProfit = adjustedGross > 0 ? adjustedGross * (1 - BELKA_TAX) : 0;
  } else {
    netProfit = grossProfit * (1 - BELKA_TAX);
  }

  const finalCapital = nominalCapital + netProfit;
  return { bonds, nominalCapital, finalCapital, netProfit, redemptionFee, earlyRedemption, annualBreakdown, startCapital: nominalCapital, seriesNum: 0, yearsInSeries };
}

function calcEDO(investment, years, inflation) {
  const seriesList = [];
  let remainingYears = years;
  const firstBuy = buyBonds(investment, BOND_FACE_VALUE);
  let activeBonds = firstBuy.bonds;
  let cashOnAccount = firstBuy.leftover;
  const annualBreakdown = [];
  let globalYear = 1;
  let seriesNum = 0;

  while (remainingYears > 0) {
    seriesNum++;
    const yearsInSeries = Math.min(remainingYears, EDO.maturityYears);
    const result = calcEDOSingle(activeBonds, yearsInSeries, inflation);
    result.seriesNum = seriesNum;

    result.annualBreakdown.forEach((r, y) => {
      annualBreakdown.push({ year: globalYear++, rate: r.rate, capitalStart: r.capitalStart, grossInterest: r.grossInterest, capitalEnd: r.capitalEnd, seriesNum, isFirstInSeries: y === 0, startCapital: result.nominalCapital });
    });

    seriesList.push({ ...result });
    remainingYears -= yearsInSeries;

    if (remainingYears > 0) {
      const totalCash = cashOnAccount + result.finalCapital;
      const roll = buyBonds(totalCash, EDO.conversionPrice);
      activeBonds = roll.bonds;
      cashOnAccount = roll.leftover;
    } else {
      cashOnAccount += result.finalCapital;
    }
  }

  const finalAmount = cashOnAccount;
  const netProfit = finalAmount - investment;
  const totalRedemptionFee = seriesList.reduce((s, r) => s + r.redemptionFee, 0);
  const earlyRedemption = seriesList[seriesList.length - 1].earlyRedemption;
  return { product: EDO, investment, years, earlyRedemption, redemptionFee: totalRedemptionFee, finalAmount, netProfit, annualBreakdown, seriesList, inflationUsed: inflation };
}

function compareProducts(investment, years, inflation) {
  const coiResult = calcCOI(investment, years, inflation);
  const edoResult = calcEDO(investment, years, inflation);
  const winner = coiResult.finalAmount >= edoResult.finalAmount ? "COI" : "EDO";
  return { coiResult, edoResult, winner };
}

// ============================================================
// DESIGN TOKENS
// ============================================================
const C = {
  navy: "#1a2e4a",
  navyLight: "#243d5c",
  orange: "#e8590c",
  orangeLight: "#fff3ed",
  orangeBorder: "#fbb89a",
  green: "#1a7a4a",
  greenLight: "#f0fdf4",
  greenBorder: "#86efac",
  blue: "#1d4ed8",
  blueLight: "#eff6ff",
  blueBorder: "#93c5fd",
  bg: "#f7f6f3",
  card: "#ffffff",
  border: "#e5e2dc",
  muted: "#6b7280",
  text: "#1a2e4a",
};

// ============================================================
// SUBCOMPONENTS
// ============================================================
function Tooltip({ children, direction = "up" }) {
  return (
    <span className="tooltip-wrap" style={{ position: "relative", display: "inline-block" }}>
      <span
        className="tooltip-trigger"
        tabIndex={0}
        style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 18, height: 18, borderRadius: "50%", background: "#e5e2dc", color: C.muted, fontSize: 11, fontWeight: 700, cursor: "pointer", marginLeft: 6, flexShrink: 0, userSelect: "none" }}
      >?</span>
      <span
        className={`tooltip-box ${direction === "down" ? "tooltip-down" : ""}`}
        style={{ display: "none", position: "absolute", left: "50%", ...(direction === "up" ? { bottom: "calc(100% + 8px)" } : { top: "calc(100% + 8px)", bottom: "auto" }), transform: "translateX(-50%)", width: 260, background: C.navy, color: "#fff", fontSize: 12, lineHeight: 1.55, borderRadius: 10, padding: "12px 14px", zIndex: 100, boxShadow: "0 8px 24px rgba(0,0,0,0.2)", pointerEvents: "none", whiteSpace: "normal" }}
      >{children}</span>
    </span>
  );
}

function ProgressBar({ screen }) {
  const total = 4;
  const pct = (screen / total) * 100;
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        {Array.from({ length: total }, (_, i) => {
          const s = i + 1;
          const cls = s < screen ? "done" : s === screen ? "active" : "";
          return (
            <div key={s} style={{ width: 8, height: 8, borderRadius: "50%", flexShrink: 0, background: cls === "done" ? C.green : cls === "active" ? C.orange : "#e5e2dc", transform: cls === "active" ? "scale(1.4)" : "scale(1)", transition: "all 0.3s ease" }} />
          );
        })}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 12, color: C.muted, fontWeight: 500 }}>Krok {screen} z {total}</span>
      </div>
      <div style={{ height: 3, background: "#e5e2dc", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg, ${C.orange}, #f08040)`, borderRadius: 99, transition: "width 0.4s cubic-bezier(0.4,0,0.2,1)" }} />
      </div>
    </div>
  );
}

function AnnualDetail({ coiResult, edoResult }) {
  return (
    <div style={{ marginTop: 12 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.blue, textTransform: "uppercase", marginBottom: 8 }}>📘 COI – odsetki co rok</div>
          {coiResult.annualBreakdown.map((r, idx) => (
            <div key={idx}>
              {r.isFirstInSeries && r.seriesNum > 1 && (
                <div style={{ fontSize: 11, color: "#6366f1", fontWeight: 600, margin: "6px 0 2px", paddingTop: 4, borderTop: "1px dashed #c7d2fe" }}>
                  Rolowanie · nominał: {fmt(r.startCapital)}
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                <span style={{ color: C.muted }}>Rok {r.year} ({fmtPct(r.rate)})</span>
                <span style={{ fontWeight: 600, color: C.text, textAlign: "right" }}>
                  +{fmt(r.netInterest)}
                  {r.redemptionFee > 0 && (<><br /><span style={{ fontSize: 11, color: "#c2410c" }}>kara: -{fmt(r.redemptionFee)}</span></>)}
                  <br /><span style={{ fontSize: 11, color: "#94a3b8" }}>brutto: {fmt(r.grossInterest)}</span>
                </span>
              </div>
            </div>
          ))}
        </div>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.green, textTransform: "uppercase", marginBottom: 8 }}>📗 EDO – kapitalizacja</div>
          {edoResult.annualBreakdown.map((r, idx) => (
            <div key={idx}>
              {r.isFirstInSeries && r.seriesNum > 1 && (
                <div style={{ fontSize: 11, color: "#6366f1", fontWeight: 600, margin: "6px 0 2px", paddingTop: 4, borderTop: "1px dashed #c7d2fe" }}>
                  Rolowanie · nominał: {fmt(r.startCapital)}
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                <span style={{ color: C.muted }}>Rok {r.year} ({fmtPct(r.rate)})</span>
                <span style={{ fontWeight: 600, color: C.text, textAlign: "right" }}>
                  +{fmt(r.grossInterest)}<br />
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>kapitał: {fmt(r.capitalEnd)}</span>
                </span>
              </div>
            </div>
          ))}
          {edoResult.seriesList.filter(s => s.earlyRedemption && s.redemptionFee > 0).map(s => (
            <div key={s.seriesNum} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 12 }}>
              <span style={{ color: "#c2410c" }}>Kara (seria {s.seriesNum})</span>
              <span style={{ fontWeight: 600, color: "#c2410c" }}>-{fmt(s.redemptionFee)}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#0369a1", display: "flex", gap: 8, alignItems: "flex-start", marginTop: 12 }}>
        <span>ℹ️</span>
        <span>Stała inflacja <strong>{(CURRENT_INFLATION * 100).toFixed(0)}%</strong> przez cały okres. Podatek Belki 19%. Rolowanie COI: wykup po cenie zamiany <strong>99,90 zł/szt</strong>, odsetki z konta po cenie nominalnej <strong>100,00 zł/szt</strong>. EDO: całość po <strong>99,90 zł/szt</strong>. Resztówka z zakupów leży na koncie bez oprocentowania.</span>
      </div>
    </div>
  );
}

function Notes({ coiResult, edoResult, years }) {
  const coiN = coiResult.seriesList.length;
  const edoN = edoResult.seriesList.length;
  return (
    <div style={{ marginTop: 8 }}>
      {(coiN > 1 || edoN > 1) && (
        <div style={{ background: C.greenLight, border: `1px solid ${C.greenBorder}`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#15803d", display: "flex", gap: 8, alignItems: "flex-start", marginTop: 8 }}>
          <span style={{ flexShrink: 0 }}>🔄</span>
          <span>Rolowanie: COI <strong>{coiN}× zakup</strong>, EDO <strong>{edoN}× zakup</strong> w ciągu {yearsLabel(years)}. COI: wykup rolowany po <strong>99,90 zł</strong>, odsetki z konta po <strong>100,00 zł</strong>. Resztówka na koncie bez oprocentowania.</span>
        </div>
      )}
      {coiN === 1 && years <= COI.maturityYears && (
        <div style={{ background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#1d4ed8", display: "flex", gap: 8, alignItems: "flex-start", marginTop: 8 }}>
          <span style={{ flexShrink: 0 }}>📘</span>
          <span>COI wypłaca odsetki co rok na konto (opodatkowane na bieżąco). Nominał wraca po wykupie. Brak efektu procentu składanego.</span>
        </div>
      )}
      {years >= 10 && (
        <div style={{ background: C.orangeLight, border: `1px solid ${C.orangeBorder}`, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#9a3412", display: "flex", gap: 8, alignItems: "flex-start", marginTop: 8 }}>
          <span>💡</span>
          <span>Sprawdź też <strong>IKE/IKZE</strong> – obligacje tam trzymane są wolne od podatku Belki!</span>
        </div>
      )}
    </div>
  );
}

function GoalCard({ goal, coiResult, edoResult, winner }) {
  const [showDetail, setShowDetail] = useState(false);
  const winnerResult = winner === "COI" ? coiResult : edoResult;
  const diff = Math.abs(coiResult.finalAmount - edoResult.finalAmount);
  const coiN = coiResult.seriesList.length;
  const edoN = edoResult.seriesList.length;
  const isWinnerCOI = winner === "COI";

  function recoText() {
    const years = goal.years;
    if (winner === "COI") {
      if (years < COI.maturityYears) return <span>Wybieramy <strong>COI</strong> – po {yearsLabel(years)} kara za wcześniejszy wykup EDO wynosi <strong>{fmtRounded(edoResult.redemptionFee)}</strong>, co zjada przewagę wyższej stopy. COI daje Ci <strong>{fmtRounded(diff)}</strong> więcej.</span>;
      if (years === COI.maturityYears) return <span>Dokładnie <strong>4 lata</strong> = termin COI. Zero kary, wypłata w terminie. COI wyprzedza EDO o <strong>{fmtRounded(diff)}</strong>.</span>;
      return <span>Przy {yearsLabel(years)} COI ({coiN}× zakup z reinwestycją) wypada lepiej o <strong>{fmtRounded(diff)}</strong> „na rękę".</span>;
    } else {
      if (years === EDO.maturityYears) return <span>Pełne <strong>10 lat</strong> = termin EDO. Zero kary + procent składany przez dekadę. EDO wyprzedza COI o <strong>{fmtRounded(diff)}</strong>.</span>;
      if (years > COI.maturityYears) return <span>Przy {yearsLabel(years)} EDO ({edoN}× zakup z reinwestycją) wygrywa dzięki <strong>kapitalizacji i wyższej marży (+2%)</strong>. Różnica: <strong>{fmtRounded(diff)}</strong> „na rękę".</span>;
      return <span>Mimo wyższej kary za wykup EDO, wyższa stopa i kapitalizacja dają <strong>{fmtRounded(diff)}</strong> przewagi.</span>;
    }
  }

  function whyContent() {
    return (
      <span style={{ fontSize: 12, lineHeight: 1.55 }}>
        <strong>📘 COI</strong> {winner === "COI" ? "✓" : "✗"} → <strong>{fmtRounded(coiResult.finalAmount)}</strong><br />
        Rok 1: {fmtPct(COI.firstYearRate)} | dalej: infl.+{fmtPct(COI.margin)}<br />
        {coiN}× zakup
        <span style={{ borderTop: "1px solid rgba(255,255,255,0.25)", display: "block", margin: "5px 0" }} />
        <strong>📗 EDO</strong> {winner === "EDO" ? "✓" : "✗"} → <strong>{fmtRounded(edoResult.finalAmount)}</strong><br />
        Rok 1: {fmtPct(EDO.firstYearRate)} | dalej: infl.+{fmtPct(EDO.margin)}<br />
        {edoN}× zakup
      </span>
    );
  }

  return (
    <div style={{ background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, boxShadow: "0 2px 16px rgba(26,46,74,0.07)", overflow: "hidden", marginBottom: 20 }}>
      <div style={{ background: C.navy, padding: "20px 24px", display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 24 }}>{goal.icon}</span>
        <div>
          <div style={{ color: "#fff", fontSize: 17, fontWeight: 700 }}>{goal.goal}</div>
          <div style={{ color: "rgba(255,255,255,0.6)", fontSize: 13 }}>{fmtShort(goal.amount)} · {yearsLabel(goal.years)}</div>
        </div>
        <div style={{ marginLeft: "auto", background: C.orange, color: "#fff", fontSize: 12, fontWeight: 700, padding: "6px 14px", borderRadius: 20, letterSpacing: "0.3px" }}>
          ✓ {winner === "COI" ? "COI wygrywa" : "EDO wygrywa"}
        </div>
      </div>

      <div style={{ padding: "22px 24px" }}>
        <div style={{ borderRadius: 14, padding: "16px 18px", marginBottom: 20, display: "flex", alignItems: "flex-start", gap: 14, background: isWinnerCOI ? C.blueLight : C.greenLight, border: isWinnerCOI ? `1.5px solid ${C.blueBorder}` : `1.5px solid ${C.greenBorder}` }}>
          <div style={{ flex: 1 }}>
            <span style={{ fontSize: 13, fontWeight: 700, padding: "4px 12px", borderRadius: 20, display: "inline-block", background: isWinnerCOI ? C.blue : C.green, color: "#fff" }}>
              ✓ Rekomendacja: {winnerResult.product.name}
            </span>
            <p style={{ fontSize: 14, color: C.text, lineHeight: 1.6, fontWeight: 500, marginTop: 8 }}>{recoText()}</p>
            <div style={{ display: "flex", alignItems: "center", marginTop: 6 }}>
              <span style={{ fontSize: 12, color: C.muted, fontWeight: 500 }}>Dlaczego ta decyzja?</span>
              <Tooltip>{whyContent()}</Tooltip>
            </div>
          </div>
        </div>

        <div style={{ background: `linear-gradient(135deg, ${C.orangeLight}, #fff8f4)`, border: `1.5px solid ${C.orangeBorder}`, borderRadius: 12, padding: "18px 20px", textAlign: "center", marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: C.orange, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.8px" }}>🏆 Otrzymasz na rękę ({winnerResult.product.shortName})</div>
          <div style={{ fontSize: 36, fontWeight: 800, color: C.navy, margin: "6px 0 2px", letterSpacing: -1 }}>{fmtRounded(winnerResult.finalAmount)}</div>
          <div style={{ fontSize: 13, color: C.muted }}>Zysk netto po podatku: <strong style={{ color: C.green }}>{fmtRounded(winnerResult.netProfit)}</strong> · Wpłata: {fmtShort(goal.amount)}</div>
        </div>

        <table style={{ width: "100%", borderCollapse: "collapse", marginBottom: 16 }}>
          <thead>
            <tr>
              {["Produkt", "Zysk netto", "Kwota końcowa"].map(h => (
                <th key={h} style={{ background: "#f7f6f3", fontSize: 11, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: "0.5px", padding: "10px 14px", textAlign: "left", borderBottom: `1px solid ${C.border}` }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[{ result: coiResult, isWin: winner === "COI" }, { result: edoResult, isWin: winner === "EDO" }].map(({ result, isWin }) => {
              const sN = result.seriesList.length;
              return (
                <tr key={result.product.shortName} style={{ background: isWin ? "#fffaf7" : "transparent" }}>
                  <td style={{ padding: "12px 14px", fontSize: 14, fontWeight: 700, color: C.text, borderBottom: `1px solid ${C.border}` }}>
                    {result.product.icon} {result.product.shortName}
                    {sN > 1 && <span style={{ background: "#dbeafe", color: "#1d4ed8", fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 99, marginLeft: 6, textTransform: "uppercase" }}>{sN}× zakup</span>}
                  </td>
                  <td style={{ padding: "12px 14px", fontSize: 14, borderBottom: `1px solid ${C.border}`, color: isWin ? C.green : C.muted, fontWeight: isWin ? 700 : 400 }}>{fmtRounded(result.netProfit)}</td>
                  <td style={{ padding: "12px 14px", fontSize: isWin ? 18 : 15, fontWeight: isWin ? 800 : 500, borderBottom: `1px solid ${C.border}`, color: isWin ? C.orange : C.muted }}>
                    {fmtRounded(result.finalAmount)}{isWin && " 🏆"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>

        <button onClick={() => setShowDetail(p => !p)} style={{ background: "none", border: `1.5px solid ${C.border}`, borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 600, color: C.navy, padding: "9px 16px", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit", width: "100%", justifyContent: "center" }}>
          📊 {showDetail ? "Ukryj" : "Pokaż"} szczegóły roczne <span style={{ color: C.muted }}>{showDetail ? "▲" : "▼"}</span>
        </button>
        {showDetail && <AnnualDetail coiResult={coiResult} edoResult={edoResult} />}
        <Notes coiResult={coiResult} edoResult={edoResult} years={goal.years} />
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
const INITIAL_STATE = { name: "", goals: [], currentGoal: { goal: "", icon: "", amount: 0, years: 0 } };

const GOAL_TILES = [
  { goal: "Wkład własny", icon: "🏠" },
  { goal: "Edukacja dzieci", icon: "🎓" },
  { goal: "Moja Emerytura", icon: "🌴" },
  { goal: "Poduszka bezpieczeństwa", icon: "🛡️" },
  { goal: "Inne", icon: "✏️" },
];

const TIME_OPTIONS = [
  { label: "1", unit: "rok", years: 1 },
  { label: "3", unit: "lata", years: 3 },
  { label: "4", unit: "lata", years: 4 },
  { label: "6", unit: "lat", years: 6 },
  { label: "10", unit: "lat", years: 10 },
  { label: "✏️", unit: "Inne", years: "custom" },
];

function App() {
  const [screen, setScreen] = useState(1);
  const [appState, setAppState] = useState(INITIAL_STATE);
  const [nameInput, setNameInput] = useState("");
  const [nameError, setNameError] = useState("");
  const [selectedGoal, setSelectedGoal] = useState(null);
  const [customGoal, setCustomGoal] = useState("");
  const [amountInput, setAmountInput] = useState("");
  const [amountError, setAmountError] = useState("");
  const [selectedYears, setSelectedYears] = useState(null);
  const [customYears, setCustomYears] = useState("");
  const [results, setResults] = useState([]);
  const topRef = useRef(null);

  function scrollTop() { topRef.current?.scrollIntoView({ behavior: "smooth" }); }
  function goTo(s) { setScreen(s); setTimeout(scrollTop, 50); }

  function handleGoToScreen2() {
    const n = nameInput.trim();
    if (!n) { setNameError("Wpisz swoje imię, żeby zacząć! 😊"); return; }
    setNameError("");
    setAppState(prev => ({ ...prev, name: n }));
    goTo(2);
  }

  function handleGoToScreen3() {
    if (!selectedGoal) { alert("Wybierz swój cel oszczędnościowy! 🎯"); return; }
    let finalName = selectedGoal.goal;
    if (selectedGoal.goal === "Inne") {
      if (!customGoal.trim()) { alert("Wpisz swój cel! ✏️"); return; }
      finalName = customGoal.trim();
    }
    setAppState(prev => ({ ...prev, currentGoal: { goal: finalName, icon: selectedGoal.icon, amount: 0, years: 0 } }));
    goTo(3);
  }

  function handleGoToScreen4() {
    const amount = parseFloat(amountInput);
    if (!amount || amount < 100) { setAmountError("Minimalna kwota to 100 zł (jedna obligacja)."); return; }
    setAmountError("");
    if (selectedYears === null) { alert("Wybierz horyzont czasowy! 📅"); return; }
    let years = 0;
    if (selectedYears === "custom") {
      years = parseInt(customYears);
      if (!years || years < 1 || years > 30) { alert("Podaj liczbę lat od 1 do 30! 📅"); return; }
    } else {
      years = selectedYears;
    }
    const newGoal = { ...appState.currentGoal, amount, years };
    setAppState(prev => ({ ...prev, goals: [...prev.goals, newGoal] }));
    goTo(4);
  }

  function handleAddAnother() {
    setSelectedGoal(null); setCustomGoal(""); setAmountInput(""); setAmountError(""); setSelectedYears(null); setCustomYears("");
    setAppState(prev => ({ ...prev, currentGoal: { goal: "", icon: "", amount: 0, years: 0 } }));
    goTo(2);
  }

  function handleRemoveGoal(i) {
    setAppState(prev => { const g = [...prev.goals]; g.splice(i, 1); return { ...prev, goals: g }; });
  }

  function handleShowResults() {
    if (appState.goals.length === 0) { alert("Dodaj najpierw przynajmniej jeden cel! 🎯"); return; }
    const newResults = appState.goals.map(g => { const { coiResult, edoResult, winner } = compareProducts(g.amount, g.years, CURRENT_INFLATION); return { goal: g, coiResult, edoResult, winner }; });
    setResults(newResults);
    goTo(5);
  }

  function handleRestart() {
    setScreen(1); setAppState(INITIAL_STATE); setNameInput(""); setNameError(""); setSelectedGoal(null);
    setCustomGoal(""); setAmountInput(""); setAmountError(""); setSelectedYears(null); setCustomYears(""); setResults([]);
    setTimeout(scrollTop, 50);
  }

  const S = {
    card: { background: C.card, borderRadius: 20, border: `1px solid ${C.border}`, padding: "32px 28px", boxShadow: "0 2px 16px rgba(26,46,74,0.07)" },
    btnPrimary: { display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, background: C.orange, color: "#fff", border: "none", borderRadius: 14, padding: "16px 28px", fontSize: 16, fontWeight: 700, cursor: "pointer", width: "100%", fontFamily: "inherit", letterSpacing: -0.2, boxShadow: "0 4px 16px rgba(232,89,12,0.25)" },
    btnSecondary: { display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, background: C.card, color: C.navy, border: `2px solid ${C.border}`, borderRadius: 14, padding: "14px 24px", fontSize: 15, fontWeight: 600, cursor: "pointer", width: "100%", fontFamily: "inherit" },
    input: { width: "100%", padding: "14px 18px", border: `2px solid ${C.border}`, borderRadius: 12, fontSize: 17, fontFamily: "inherit", color: C.text, background: C.card, outline: "none" },
    label: { display: "block", fontSize: 13, fontWeight: 600, color: C.muted, marginBottom: 8, letterSpacing: "0.4px", textTransform: "uppercase" },
    stepLabel: { display: "inline-flex", alignItems: "center", gap: 6, background: C.orangeLight, borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 700, color: C.orange, textTransform: "uppercase", letterSpacing: "0.4px", marginBottom: 16 },
    screenTitle: { fontSize: 26, fontWeight: 800, color: C.navy, marginBottom: 6, lineHeight: 1.25, letterSpacing: -0.5 },
    screenSub: { fontSize: 15, color: C.muted, marginBottom: 28, lineHeight: 1.6 },
  };

  return (
    <div style={{ fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", background: C.bg, minHeight: "100vh", color: C.text, overflowX: "hidden" }}>
      {/* Header */}
      <header style={{ background: C.navy, padding: "0 24px", display: "flex", alignItems: "center", gap: 12, height: 58, borderBottom: `3px solid ${C.orange}` }}>
        <div>
          <div style={{ color: "#fff", fontSize: 15, fontWeight: 700, letterSpacing: -0.3 }}>💰 Kalkulator COI i EDO</div>
          <div style={{ color: "rgba(255,255,255,0.5)", fontSize: 11 }}>marciniwuc.com · Kwiecień 2026</div>
        </div>
        <div style={{ marginLeft: "auto" }}>
          <span style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.15)", color: "rgba(255,255,255,0.7)", fontSize: 11, fontWeight: 600, padding: "4px 10px", borderRadius: 20 }}>FBO Team</span>
        </div>
      </header>

      <div ref={topRef} />
      <div style={{ maxWidth: 680, margin: "0 auto", padding: "28px 16px 60px" }}>
        {screen <= 4 && <ProgressBar screen={screen} />}

        {/* Screen 1: Name */}
        {screen === 1 && (
          <div style={S.card}>
            <span style={{ fontSize: 40, marginBottom: 12, display: "block" }}>👋</span>
            <div style={S.stepLabel}>Krok 1 · Cześć!</div>
            <h1 style={S.screenTitle}>Jak masz na imię?</h1>
            <p style={S.screenSub}>Zbudujemy razem Twój spersonalizowany plan oszczędnościowy. To zajmie tylko chwilę!</p>
            <label style={S.label}>Twoje imię</label>
            <input style={{ ...S.input, borderColor: nameError ? "#dc2626" : C.border, boxShadow: nameError ? "0 0 0 4px rgba(220,38,38,0.1)" : undefined }} type="text" placeholder="np. Anna" maxLength={30} value={nameInput} onChange={e => { setNameInput(e.target.value); if (nameError) setNameError(""); }} onKeyDown={e => e.key === "Enter" && handleGoToScreen2()} autoComplete="given-name" />
            {nameError && <p style={{ color: "#dc2626", fontSize: 13, marginTop: 6, fontWeight: 500 }}>{nameError}</p>}
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 24 }}>
              <button style={S.btnPrimary} onClick={handleGoToScreen2}>Dalej →</button>
            </div>
          </div>
        )}

        {/* Screen 2: Goal */}
        {screen === 2 && (
          <div style={S.card}>
            <span style={{ fontSize: 40, marginBottom: 12, display: "block" }}>🎯</span>
            <div style={S.stepLabel}>Krok 2 · Cel</div>
            <h1 style={S.screenTitle}>{appState.name}, na co odkładasz?</h1>
            <p style={S.screenSub}>Wybierz cel, który chcesz teraz zaplanować. Możesz dodać więcej celów po kolei.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
              {GOAL_TILES.map(t => {
                const isSel = selectedGoal?.goal === t.goal;
                const isWide = t.goal === "Inne";
                return (
                  <div key={t.goal} onClick={() => setSelectedGoal(t)} style={{ gridColumn: isWide ? "span 2" : undefined, border: `2px solid ${isSel ? C.orange : C.border}`, borderRadius: 14, padding: "18px 16px", cursor: "pointer", textAlign: "center", background: isSel ? C.orangeLight : C.card, boxShadow: isSel ? `0 0 0 4px rgba(232,89,12,0.1)` : undefined, userSelect: "none", transition: "all 0.15s ease" }}>
                    <span style={{ fontSize: 28, marginBottom: 8, display: "block" }}>{t.icon}</span>
                    <span style={{ fontSize: 14, fontWeight: 600, color: isSel ? C.orange : C.navy }}>{t.goal === "Inne" ? "Inne (wpisz własny)" : t.goal}</span>
                  </div>
                );
              })}
            </div>
            {selectedGoal?.goal === "Inne" && (
              <div style={{ marginTop: 8 }}>
                <label style={S.label}>Wpisz swój cel</label>
                <input style={S.input} type="text" placeholder="np. Wakacje marzeń" maxLength={40} value={customGoal} onChange={e => setCustomGoal(e.target.value)} autoFocus />
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 24 }}>
              <button style={S.btnPrimary} onClick={handleGoToScreen3}>Dalej →</button>
              <button style={S.btnSecondary} onClick={() => goTo(1)}>← Wróć</button>
            </div>
          </div>
        )}

        {/* Screen 3: Amount & Time */}
        {screen === 3 && (
          <div style={S.card}>
            <span style={{ fontSize: 40, marginBottom: 12, display: "block" }}>💰</span>
            <div style={S.stepLabel}>Krok 3 · Kwota i Czas</div>
            <h1 style={S.screenTitle}>💼 {appState.currentGoal.goal}</h1>
            <p style={S.screenSub}>Ile chcesz wpłacić i za ile lat będziesz potrzebować tych pieniędzy?</p>
            <label style={S.label}>Kwota jednorazowej wpłaty</label>
            <div style={{ position: "relative", marginBottom: 24 }}>
              <span style={{ position: "absolute", left: 18, top: "50%", transform: "translateY(-50%)", fontSize: 17, color: C.muted, fontWeight: 600, pointerEvents: "none" }}>zł</span>
              <input style={{ ...S.input, paddingLeft: 44, borderColor: amountError ? "#dc2626" : C.border, boxShadow: amountError ? "0 0 0 4px rgba(220,38,38,0.1)" : undefined }} type="number" placeholder="10 000" min={100} max={9999999} step={100} value={amountInput} onChange={e => { setAmountInput(e.target.value); if (amountError) setAmountError(""); }} />
            </div>
            {amountError && <p style={{ color: "#dc2626", fontSize: 13, marginTop: -18, marginBottom: 16, fontWeight: 500 }}>{amountError}</p>}
            <label style={S.label}>Za ile lat będziesz potrzebować tych pieniędzy?</label>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10, marginBottom: 12 }}>
              {TIME_OPTIONS.map(t => {
                const isSel = selectedYears === t.years;
                return (
                  <div key={String(t.years)} onClick={() => setSelectedYears(t.years)} style={{ border: `2px solid ${isSel ? C.orange : C.border}`, borderRadius: 12, padding: "14px 8px", cursor: "pointer", textAlign: "center", background: isSel ? C.orangeLight : C.card, boxShadow: isSel ? `0 0 0 4px rgba(232,89,12,0.1)` : undefined, userSelect: "none", transition: "all 0.15s ease" }}>
                    <span style={{ display: "block", fontSize: 22, fontWeight: 800, color: isSel ? C.orange : C.navy }}>{t.label}</span>
                    <span style={{ display: "block", fontSize: 12, color: C.muted, fontWeight: 500 }}>{t.unit}</span>
                  </div>
                );
              })}
            </div>
            {selectedYears === "custom" && (
              <div style={{ marginBottom: 16 }}>
                <label style={S.label}>Podaj liczbę lat (1–30)</label>
                <div style={{ position: "relative" }}>
                  <input style={{ ...S.input, paddingRight: 48 }} type="number" placeholder="7" min={1} max={30} value={customYears} onChange={e => setCustomYears(e.target.value)} autoFocus />
                  <span style={{ position: "absolute", right: 18, top: "50%", transform: "translateY(-50%)", fontSize: 14, color: C.muted, pointerEvents: "none" }}>lat</span>
                </div>
              </div>
            )}
            <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 24 }}>
              <button style={S.btnPrimary} onClick={handleGoToScreen4}>Dalej →</button>
              <button style={S.btnSecondary} onClick={() => goTo(2)}>← Wróć</button>
            </div>
          </div>
        )}

        {/* Screen 4: Plan */}
        {screen === 4 && (
          <div style={S.card}>
            <span style={{ fontSize: 40, marginBottom: 12, display: "block" }}>📋</span>
            <div style={S.stepLabel}>Krok 4 · Twoje Cele</div>
            <h1 style={S.screenTitle}>Cześć {appState.name}! Twoje cele 📋</h1>
            <p style={S.screenSub}>Świetnie! Oto Twoje cele. Możesz dodać kolejny lub od razu zobaczyć plan.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 24 }}>
              {appState.goals.map((g, i) => (
                <div key={i} style={{ background: "#f7f6f3", borderRadius: 12, padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, border: `1px solid ${C.border}` }}>
                  <span style={{ fontSize: 22 }}>{g.icon}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: C.navy }}>{g.goal}</div>
                    <div style={{ fontSize: 13, color: C.muted }}>{fmtShort(g.amount)} · {yearsLabel(g.years)}</div>
                  </div>
                  <button onClick={() => handleRemoveGoal(i)} style={{ background: "#fff5f5", color: "#dc2626", border: "1.5px solid #fecaca", borderRadius: 10, padding: "8px 16px", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>✕ Usuń</button>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <button style={S.btnPrimary} onClick={handleShowResults}>✓ Pokaż mój plan finansowy</button>
              <button style={S.btnSecondary} onClick={handleAddAnother}>+ Dodaj kolejny cel</button>
            </div>
          </div>
        )}

        {/* Screen 5: Results */}
        {screen === 5 && (
          <div>
            <div style={{ marginBottom: 28 }}>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: C.navy, letterSpacing: -0.5, marginBottom: 6 }}>{appState.name}, oto Twój plan finansowy! 📊</h1>
              <p style={{ fontSize: 14, color: C.muted, marginBottom: 6 }}>Porównanie obligacji COI (4-letnie) i EDO (10-letnie)</p>
              <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: C.muted, fontWeight: 500 }}>
                <span>Przyjęta inflacja: <strong style={{ color: C.navy }}>5% rocznie</strong></span>
                <Tooltip direction="down">Kalkulator zakłada stałą inflację 5% rocznie. To wartość orientacyjna – rzeczywista inflacja może być wyższa lub niższa. Wpływa ona na oprocentowanie obligacji COI i EDO w kolejnych latach.</Tooltip>
              </div>
            </div>

            {results.map((r, i) => <GoalCard key={i} goal={r.goal} coiResult={r.coiResult} edoResult={r.edoResult} winner={r.winner} />)}

            <div style={{ background: C.navy, borderRadius: 20, padding: "28px 24px", marginBottom: 24 }}>
              <h3 style={{ color: "#fff", fontSize: 16, fontWeight: 700, marginBottom: 4 }}>📚 Chcesz wiedzieć więcej?</h3>
              <p style={{ color: "rgba(255,255,255,0.55)", fontSize: 13, marginBottom: 18 }}>Sprawdź materiały FBO</p>
              {[
                { icon: "📖", text: "Obligacje indeksowane inflacją – kalkulator i przewodnik", href: "https://marciniwuc.com/obligacje-indeksowane-inflacja-kalkulator/" },
                { icon: "🏆", text: "Ranking IKE i IKZE – gdzie otworzyć konto?", href: "https://marciniwuc.com/ranking-ike-i-ikze/" },
                { icon: "📝", text: "Zobacz inne najnowsze wpisy na blogu", href: "https://marciniwuc.com/strona-z-wpisami/" },
              ].map(l => (
                <a key={l.href} href={l.href} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 12, textDecoration: "none", marginBottom: 10 }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{l.icon}</span>
                  <span style={{ color: "#fff", fontSize: 14, fontWeight: 500, lineHeight: 1.4 }}>{l.text}</span>
                  <span style={{ marginLeft: "auto", color: C.orange, fontSize: 16, flexShrink: 0 }}>↗</span>
                </a>
              ))}
            </div>

            <div style={{ background: C.card, borderRadius: 12, padding: "16px 18px", fontSize: 12, color: C.muted, lineHeight: 1.6, border: `1px solid ${C.border}`, marginBottom: 20 }}>
              ⚠️ <strong>Informacja prawna:</strong> Powyższe obliczenia mają charakter wyłącznie edukacyjny i informacyjny. Nie stanowią porady inwestycyjnej ani rekomendacji finansowej. Wyniki są szacunkowe – zakładają stałą inflację (5%) przez cały okres. Rzeczywiste wyniki mogą się różnić. Przed podjęciem decyzji inwestycyjnych skonsultuj się z doradcą finansowym lub odwiedź{" "}
              <a href="https://marciniwuc.com" target="_blank" rel="noopener noreferrer" style={{ color: C.orange }}>marciniwuc.com</a>.
            </div>

            <button onClick={handleRestart} style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, width: "100%", padding: 14, border: `2px dashed ${C.border}`, borderRadius: 14, background: "transparent", color: C.muted, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", marginTop: 8 }}>
              🔄 Zacznij od nowa
            </button>
          </div>
        )}
      </div>

      <footer style={{ background: C.navy, borderTop: `3px solid ${C.orange}`, padding: "18px 24px", textAlign: "center" }}>
        <p style={{ color: "rgba(255,255,255,0.45)", fontSize: 12, margin: 0 }}>
          Created by <strong style={{ color: "rgba(255,255,255,0.7)" }}>Patryk Kaminiecki</strong> for FBO team |{" "}
          <a href="https://marciniwuc.com" target="_blank" rel="noopener noreferrer" style={{ color: C.orange, textDecoration: "none", fontWeight: 600 }}>marciniwuc.com</a>
        </p>
      </footer>
    </div>
  );
}
