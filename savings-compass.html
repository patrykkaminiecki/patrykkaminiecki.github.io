function AnnualDetail({ productResults, years, copy, lang }) {
  const unitLabel = lang === "pl" ? "(PLN)" : "(PLN)";
  return (
    <div>
      <AnnualTrendChart productResults={productResults} years={years} copy={copy} lang={lang} />
      <div className="table-wrap">
        <table className="detail-table">
          <thead>
            <tr>
              <th>{copy.yearLabel}</th>
              {productResults.map(result => (
                <th key={result.product.key}>
                  {result.product.icon} {result.product.key === ACCOUNT_PRODUCT.key ? (lang === "pl" ? "Konto" : "Savings") : getProductShortName(result.product, lang)}
                  <br /><span style={{ fontWeight: 500, opacity: 0.6, letterSpacing: 0 }}>{unitLabel}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {Array.from({ length: years }, (_, index) => {
              const annualValues = productResults
                .map(result => result.annualBreakdown[index]?.finalAmount)
                .filter(value => Number.isFinite(value));
              const bestForYear = annualValues.length > 0 ? Math.max(...annualValues) : null;
              const isLastYear = index === years - 1;

              return (
                <tr key={index}>
                  <td>{copy.yearLabel} {index + 1}</td>
                  {productResults.map(result => {
                    const annual = result.annualBreakdown[index];
                    const isBest = annual && bestForYear !== null && Math.abs(annual.finalAmount - bestForYear) < 0.000001;

                    return (
                      <td
                        key={result.product.key}
                        className={isBest ? "detail-best" : undefined}
                        style={{
                          fontWeight: isBest ? 800 : isLastYear ? 700 : 500,
                          color: isBest ? C.green : undefined,
                          background: isBest ? C.greenLight : undefined,
                        }}
                      >
                        {annual ? fmtNumber(annual.finalAmount) : "—"}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function formatGroupedLocale(num, options = {}) {
  const localized = new Intl.NumberFormat("pl-PL", { ...options, useGrouping: false }).format(num);
  const [integerPart, fractionalPart] = localized.split(",");
  const groupedInteger = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, " ");
  return fractionalPart !== undefined ? `${groupedInteger},${fractionalPart}` : groupedInteger;
}

function fmtRounded(num) {
  return formatGroupedLocale(Math.round(num), { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + " PLN";
}

function fmtShort(num) {
  return formatGroupedLocale(num, { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + " PLN";
}
function fmtNumber(num) {
  return formatGroupedLocale(Math.round(num), { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function sanitizeIntegerInput(rawValue, maxDigits = 9) {
  return String(rawValue || "").replace(/\D+/g, "").slice(0, maxDigits);
}
function fmtInputNumber(rawValue) {
  const digits = sanitizeIntegerInput(rawValue);
  return digits ? formatGroupedLocale(Number.parseInt(digits, 10), { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : "";
}
function parseInputNumber(rawValue) {
  const digits = sanitizeIntegerInput(rawValue);
  return digits ? Number.parseInt(digits, 10) : Number.NaN;
}
function fmtPctValue(rate) {
  return (rate * 100).toFixed(2).replace(".", ",");
}
function yearsLabel(y, lang = "pl") {
  if (lang === "en") return y === 1 ? "1 year" : `${y} years`;
  if (y === 1) return "1 rok";
  if (y < 5) return y + " lata";
  return y + " lat";
}
function yearsAfterLabel(y, lang = "pl") {
  if (lang === "en") return y === 1 ? "1 year" : `${y} years`;
  if (y === 1) return "1 roku";
  return y + " latach";
}
function buyBonds(cash, pricePerBond) {
  const bonds = Math.floor(cash / pricePerBond);
  const spent = bonds * pricePerBond;
  const leftover = cash - spent;
  return { bonds, spent, leftover };
}

// ============================================================
// FINANCIAL ENGINE
// ============================================================
function getProductRate(product, monthsInSeries, scenario) {
  if (monthsInSeries <= product.introMonths) return product.initialRate;
  if (product.postIntroMode === "fixed") return product.margin + product.initialRate;
  return product.margin + (scenario[product.indexKey] || 0);
}

function getAccruedMonths(product, monthsInSeries) {
  const period = product.payoutMonths || product.capitalizationMonths || 1;
  const remainder = monthsInSeries % period;
  return remainder === 0 ? period : remainder;
}

function calcEarlyRedemptionFee(product, monthsInSeries, bonds, nominalValue, grossValue) {
  if (monthsInSeries === product.maturityMonths) return 0;

  const profit = grossValue - nominalValue;
  if (profit <= 0) return 0;

  const maxFee = bonds * product.earlyRedemptionFee;
  if (product.protectionMonths === "full") return Math.min(profit, maxFee);
  if (typeof product.protectionMonths === "number" && monthsInSeries <= product.protectionMonths) {
    return Math.min(profit, maxFee);
  }
  return maxFee;
}

function calcNetRedemptionValue(grossValue, nominalValue, redemptionFee) {
  const taxableProfit = grossValue - nominalValue - redemptionFee;
  return grossValue - redemptionFee - taxableProfit * BELKA_TAX;
}

function rollProductState(product, prevNetRedemptionValue, prevAccountBalance) {
  const rollPrice = product.rollPrice || BOND_FACE_VALUE;
  const bondsFromRedemption = Math.floor(prevNetRedemptionValue / rollPrice);
  const spentFromRedemption = bondsFromRedemption * rollPrice;
  const accountSpent = product.useAccountForRollover ? Math.floor(prevAccountBalance / BOND_FACE_VALUE) * BOND_FACE_VALUE : 0;
  const bondsFromAccount = accountSpent / BOND_FACE_VALUE;
  const bonds = bondsFromRedemption + bondsFromAccount;
  const purchaseValue = spentFromRedemption + accountSpent;

  return {
    bonds,
    purchaseValue,
    nominalValue: bonds * BOND_FACE_VALUE,
    accountSpent,
  };
}

function calcBondProduct(product, investment, years, scenario = DEFAULT_SCENARIO) {
  const totalMonths = years * 12;
  const firstBuy = buyBonds(investment, BOND_FACE_VALUE);

  let bonds = firstBuy.bonds;
  let nominalValue = bonds * BOND_FACE_VALUE;
  let accountBalance = firstBuy.leftover;
  let capitalBase = nominalValue;
  let monthsInSeries = 0;
  let seriesCount = bonds > 0 ? 1 : 0;
  let previousGrossValue = nominalValue;
  let previousNetRedemptionValue = nominalValue;
  let previousMatured = false;
  let lastRedemptionFee = 0;

  let yearGrossInterest = 0;
  let yearCashFlow = 0;
  let yearFees = 0;
  let yearSeriesNum = seriesCount;
  let yearStartCapital = nominalValue;

  const annualBreakdown = [];
  const monthlyFactor = 1 + scenario.account / 12 * (1 - BELKA_TAX);

  for (let month = 1; month <= totalMonths; month++) {
    let accountSpentForRollover = 0;
    if (previousMatured) {
      const rolled = rollProductState(product, previousNetRedemptionValue, accountBalance);
      bonds = rolled.bonds;
      nominalValue = rolled.nominalValue;
      capitalBase = nominalValue;
      accountSpentForRollover = rolled.accountSpent;
      monthsInSeries = 1;
      seriesCount += 1;
      yearSeriesNum = seriesCount;
      yearStartCapital = nominalValue;
    } else {
      monthsInSeries += 1;
      if (product.mode === "capitalizing" && monthsInSeries > 1 && (monthsInSeries - 1) % product.capitalizationMonths === 0) {
        capitalBase = previousGrossValue;
      }
    }

    const rate = getProductRate(product, monthsInSeries, scenario);
    const accruedMonths = getAccruedMonths(product, monthsInSeries);
    const baseValue = product.mode === "capitalizing" ? capitalBase : nominalValue;
    const grossValue = baseValue * (1 + rate * accruedMonths / 12);
    const matured = monthsInSeries === product.maturityMonths;
    const redemptionFee = calcEarlyRedemptionFee(product, monthsInSeries, bonds, nominalValue, grossValue);
    const netRedemptionValue = calcNetRedemptionValue(grossValue, nominalValue, redemptionFee);
    const isPayoutMonth = Boolean(product.payoutMonths) && accruedMonths === product.payoutMonths;

    let cashFlowToAccount = 0;
    if (product.cashFlowMode === "payout-plus-spread") {
      if (isPayoutMonth) cashFlowToAccount += (grossValue - nominalValue) * (1 - BELKA_TAX);
      if (matured) cashFlowToAccount += Math.floor(grossValue / product.rollPrice) * (BOND_FACE_VALUE - product.rollPrice);
    } else if (product.cashFlowMode === "coi") {
      if (matured) {
        cashFlowToAccount += netRedemptionValue - Math.floor(netRedemptionValue / product.rollPrice) * product.rollPrice;
      } else if (isPayoutMonth) {
        cashFlowToAccount += (grossValue - nominalValue) * (1 - BELKA_TAX);
      }
    } else if (product.cashFlowMode === "leftover-after-roll") {
      const rollPrice = product.rollPrice || BOND_FACE_VALUE;
      if (matured) cashFlowToAccount += netRedemptionValue - Math.floor(netRedemptionValue / rollPrice) * rollPrice;
    }

    const accountPrincipal = accountBalance - accountSpentForRollover;
    const resultAccountBase = product.subtractAccountSpendInResultOnRollover ? accountPrincipal : accountBalance;

    accountBalance = accountPrincipal * monthlyFactor + cashFlowToAccount;
    const finalAmount = resultAccountBase * monthlyFactor + netRedemptionValue;

    yearGrossInterest += grossValue - nominalValue;
    yearCashFlow += cashFlowToAccount;
    yearFees += redemptionFee;
    lastRedemptionFee = redemptionFee;

    if (month % 12 === 0) {
      annualBreakdown.push({
        year: month / 12,
        rate,
        grossInterest: yearGrossInterest,
        netInterest: yearCashFlow,
        redemptionFee: yearFees,
        bondValue: netRedemptionValue,
        accountValue: accountBalance,
        finalAmount,
        seriesNum: yearSeriesNum,
        startCapital: yearStartCapital,
        capitalStart: baseValue,
        capitalEnd: grossValue,
        isFirstInSeries: false,
      });
      yearGrossInterest = 0;
      yearCashFlow = 0;
      yearFees = 0;
      yearStartCapital = nominalValue;
      yearSeriesNum = seriesCount;
    }

    previousGrossValue = grossValue;
    previousNetRedemptionValue = netRedemptionValue;
    previousMatured = matured;
  }

  const finalAmount = annualBreakdown.length ? annualBreakdown[annualBreakdown.length - 1].finalAmount : investment;

  return {
    product,
    investment,
    years,
    finalAmount,
    netProfit: finalAmount - investment,
    redemptionFee: lastRedemptionFee,
    annualBreakdown,
    seriesCount,
  };
}

function calcAccountProduct(investment, years, scenario = DEFAULT_SCENARIO) {
  const monthlyFactor = 1 + scenario.account / 12 * (1 - BELKA_TAX);
  let balance = investment;
  const annualBreakdown = [];

  for (let year = 1; year <= years; year++) {
    const startBalance = balance;
    for (let month = 0; month < 12; month++) balance *= monthlyFactor;
    annualBreakdown.push({
      year,
      rate: scenario.account,
      grossInterest: balance - startBalance,
      netInterest: balance - startBalance,
      redemptionFee: 0,
      bondValue: balance,
      accountValue: balance,
      finalAmount: balance,
      seriesNum: 1,
      startCapital: startBalance,
      capitalStart: startBalance,
      capitalEnd: balance,
      isFirstInSeries: false,
    });
  }

  return {
    product: ACCOUNT_PRODUCT,
    investment,
    years,
    finalAmount: balance,
    netProfit: balance - investment,
    redemptionFee: 0,
    annualBreakdown,
    seriesCount: 1,
  };
}

function calcProduct(product, investment, years, scenario = DEFAULT_SCENARIO) {
  if (product.key === ACCOUNT_PRODUCT.key) return calcAccountProduct(investment, years, scenario);
  return calcBondProduct(product, investment, years, scenario);
}

function compareProducts(investment, years, scenario = DEFAULT_SCENARIO) {
  const productResults = ALL_PRODUCTS.map(product => calcProduct(product, investment, years, scenario))
    .sort((left, right) => right.finalAmount - left.finalAmount);
  return {
    productResults,
    winner: productResults[0],
    runnerUp: productResults[1],
    thirdPlace: productResults[2],
  };
}

function getLocalized(value, lang) {
  if (value && typeof value === "object" && !Array.isArray(value)) return value[lang] ?? value.pl ?? "";
  return value ?? "";
}

function getProductColor(productKey) {
  return PRODUCT_COLORS[productKey] || C.textSecondary;
}

function buildTrendPath(points) {
  if (!points.length) return "";
  if (points.length === 1) {
    const onlyPoint = points[0];
    return `M ${onlyPoint.x - 8} ${onlyPoint.y} L ${onlyPoint.x + 8} ${onlyPoint.y}`;
  }
  return `M ${points.map(point => `${point.x} ${point.y}`).join(" L ")}`;
}

function getTrendXTicks(years) {
  if (years <= 6) return Array.from({ length: years }, (_, index) => index + 1);
  return [...new Set([
    1,
    Math.max(2, Math.round(years * 0.25)),
    Math.max(2, Math.round(years * 0.5)),
    Math.max(2, Math.round(years * 0.75)),
    years,
  ])].sort((left, right) => left - right);
}

function AnnualTrendChart({ productResults, years, copy, lang }) {
  const width = 860;
  const height = 280;
  const padding = { top: 18, right: 18, bottom: 30, left: 56 };
  const innerWidth = width - padding.left - padding.right;
  const innerHeight = height - padding.top - padding.bottom;
  const allValues = productResults.flatMap(result => result.annualBreakdown.map(row => row.finalAmount)).filter(Number.isFinite);

  if (!allValues.length) return null;

  const minRaw = Math.min(...allValues);
  const maxRaw = Math.max(...allValues);
  const span = Math.max(1, maxRaw - minRaw);
  const minValue = Math.max(0, minRaw - span * 0.08);
  const maxValue = maxRaw + span * 0.12;
  const range = Math.max(1, maxValue - minValue);
  const topKeys = new Set(productResults.slice(0, 3).map(result => result.product.key));
  const yTicks = Array.from({ length: 4 }, (_, index) => maxValue - range * (index / 3));
  const xTicks = getTrendXTicks(years);

  const xFor = index => padding.left + (years === 1 ? innerWidth / 2 : (index / (years - 1)) * innerWidth);
  const yFor = value => padding.top + ((maxValue - value) / range) * innerHeight;

  return (
    <div className="annual-visual">
      <div className="chart-legend">
        {productResults.map((result, index) => (
          <span key={result.product.key} className={`chart-legend-item ${index < 3 ? "top" : ""}`}>
            <span className="legend-swatch" style={{ background: getProductColor(result.product.key) }} />
            {getProductShortName(result.product, lang)}
          </span>
        ))}
      </div>

      <div className="trend-chart-shell">
        <svg className="trend-chart" viewBox={`0 0 ${width} ${height}`} role="img" aria-label={copy.annualChartTitle}>
          {yTicks.map(value => {
            const y = yFor(value);
            return (
              <g key={value}>
                <line className="chart-grid" x1={padding.left} y1={y} x2={width - padding.right} y2={y} />
                <text className="chart-y-label" x={padding.left - 8} y={y + 3} textAnchor="end">{fmtNumber(value)}</text>
              </g>
            );
          })}

          <line className="chart-axis" x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} />

          {xTicks.map(year => {
            const x = xFor(year - 1);
            return <text key={year} className="chart-x-label" x={x} y={height - 8} textAnchor="middle">{year}</text>;
          })}

          {productResults.map(result => {
            const color = getProductColor(result.product.key);
            const points = result.annualBreakdown.map((row, pointIndex) => ({ x: xFor(pointIndex), y: yFor(row.finalAmount) }));
            const endPoint = points[points.length - 1];
            const isTop = topKeys.has(result.product.key);

            return (
              <g key={result.product.key}>
                <path className={`chart-line ${isTop ? "top" : "other"}`} d={buildTrendPath(points)} stroke={color}>
                  <title>{getProductShortName(result.product, lang)}</title>
                </path>
                {endPoint && (
                  <circle className="chart-endpoint" cx={endPoint.x} cy={endPoint.y} r={isTop ? 4.6 : 3.4} fill={color} opacity={isTop ? 1 : 0.65} />
                )}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

const SLIDER_MIN = 0;
const SLIDER_MAX = 15;
const SLIDER_STEP = 0.05;

function AssumptionFieldCard({ field, value, editable, onChange, lang }) {
  const pct = Number((value * 100).toFixed(2));
  const fillPct = ((pct - SLIDER_MIN) / (SLIDER_MAX - SLIDER_MIN)) * 100;
  const clampedFill = Math.min(100, Math.max(0, fillPct));
  const trackStyle = {
    background: editable
      ? `linear-gradient(to right, var(--blue) 0% ${clampedFill}%, var(--g7) ${clampedFill}% 100%)`
      : `linear-gradient(to right, var(--g5) 0% ${clampedFill}%, var(--g7) ${clampedFill}% 100%)`
  };

  return (
    <div className="assumption-field">
      <div className="assumption-field-head">
        <div>
          <div className="assumption-name">{getLocalized(field.label, lang)}</div>
          <div className="assumption-hint">{getLocalized(field.hint, lang)}</div>
        </div>
        <span className={`assumption-value-badge${!editable ? " locked" : ""}`}>
          {fmtPctValue(value)}%
        </span>
      </div>
      <div className="slider-wrap">
        <input
          className="assumption-slider"
          type="range"
          min={SLIDER_MIN}
          max={SLIDER_MAX}
          step={SLIDER_STEP}
          value={pct}
          disabled={!editable}
          style={trackStyle}
          onChange={e => onChange(field.key, e.target.value)}
        />
        <div className="slider-labels">
          <span className="slider-label-min">{SLIDER_MIN}%</span>
          <span className="slider-label-max">{SLIDER_MAX}%</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("pl");
  const [screen, setScreen] = useState(1);
  const [navDir, setNavDir] = useState("forward");
  const [theme, setTheme] = useState(() =>
    window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light"
  );
  const [appState, setAppState] = useState(INITIAL_STATE);
  const [nameInput, setNameInput] = useState("");
  const [nameError, setNameError] = useState("");
  const [selectedGoal, setSelectedGoal] = useState(null);
  const [goalError, setGoalError] = useState("");
  const [customGoal, setCustomGoal] = useState("");
  const [amountInput, setAmountInput] = useState("");
  const [amountError, setAmountError] = useState("");
  const [selectedYears, setSelectedYears] = useState(null);
  const [yearsError, setYearsError] = useState("");
  const [customYears, setCustomYears] = useState("");
  const [results, setResults] = useState([]);
  const [activeGoalIndex, setActiveGoalIndex] = useState(0);
  const [editingGoalIndex, setEditingGoalIndex] = useState(null);
  const [scenarioDraft, setScenarioDraft] = useState({ ...DEFAULT_SCENARIO });
  const [appliedScenario, setAppliedScenario] = useState({ ...DEFAULT_SCENARIO });
  const [customScenarioEnabled, setCustomScenarioEnabled] = useState(false);
  const [showAssumptionsPanel, setShowAssumptionsPanel] = useState(false);
  const topRef = useRef(null);
  const copy = COPY[lang];

  useEffect(() => {
    document.title = copy.appTitle;
    document.documentElement.lang = lang;
  }, [copy.appTitle, lang]);

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  function scrollTop() { topRef.current?.scrollIntoView({ behavior: "smooth" }); }
  function goTo(s) { setNavDir(s < screen ? "back" : "forward"); setScreen(s); setTimeout(scrollTop, 50); }
  function resetGoalDraft() {
    setSelectedGoal(null);
    setGoalError("");
    setCustomGoal("");
    setAmountInput("");
    setAmountError("");
    setSelectedYears(null);
    setYearsError("");
    setCustomYears("");
    setEditingGoalIndex(null);
  }

  function updateScenarioField(field, rawValue) {
    const parsedValue = Number.parseFloat(String(rawValue).replace(",", ".").trim());
    const nextScenario = {
      ...scenarioDraft,
      [field]: Number.isFinite(parsedValue) ? Math.min(100, Math.max(0, parsedValue)) / 100 : 0,
    };

    setScenarioDraft(nextScenario);
    if (appState.goals.length > 0) calculateResultsForScenario(appState.goals, nextScenario);
  }

  function calculateResultsForScenario(goals, scenario) {
    const snapshot = { ...scenario };
    const newResults = goals.map(goal => ({ goal, ...compareProducts(goal.amount, goal.years, snapshot) }));
    setAppliedScenario(snapshot);
    setResults(newResults);
  }

  function resetScenarioToDefault() {
    const defaultScenario = { ...DEFAULT_SCENARIO };
    setCustomScenarioEnabled(false);
    setScenarioDraft(defaultScenario);
    if (appState.goals.length > 0) {
      calculateResultsForScenario(appState.goals, defaultScenario);
      return;
    }
    setAppliedScenario(defaultScenario);
  }

  function handleScenarioToggle() {
    if (customScenarioEnabled) {
      resetScenarioToDefault();
      return;
    }
    setScenarioDraft({ ...appliedScenario });
    setCustomScenarioEnabled(true);
  }

  function openGoalForEditing(index) {
    const goal = appState.goals[index];
    if (!goal) return;

    const predefinedGoal = GOAL_TILES.find(tile => tile.id !== CUSTOM_GOAL_ID && tile.id === goal.goalId);
    const customTile = GOAL_TILES.find(tile => tile.id === CUSTOM_GOAL_ID);
    const hasPresetYears = TIME_OPTIONS.some(option => option.years === goal.years);

    setSelectedGoal(predefinedGoal || customTile || null);
    setGoalError("");
    setCustomGoal(predefinedGoal ? "" : goal.goal);
    setAmountInput(String(Math.round(goal.amount)));
    setAmountError("");
    setSelectedYears(hasPresetYears ? goal.years : "custom");
    setYearsError("");
    setCustomYears(hasPresetYears ? "" : String(goal.years));
    setEditingGoalIndex(index);
    setShowAssumptionsPanel(false);
    setAppState(prev => ({ ...prev, currentGoal: { goalId: goal.goalId || "", goal: goal.goal, icon: goal.icon, amount: goal.amount, years: goal.years, custom: Boolean(goal.custom) } }));
    goTo(3);
  }

  function handleGoToScreen2() {
    const n = nameInput.trim();
    if (!n) { setNameError(copy.nameError); return; }
    setNameError("");
    setAppState(prev => ({ ...prev, name: n }));
    goTo(2);
  }

  function handleGoToScreen3() {
    if (!selectedGoal) { setGoalError(copy.goalError); return; }
    let finalName = getGoalTileLabel(selectedGoal, lang);
    if (selectedGoal.id === CUSTOM_GOAL_ID) {
      if (!customGoal.trim()) { setGoalError(copy.customGoalError); return; }
      finalName = customGoal.trim();
    }
    setGoalError("");
    setAppState(prev => ({ ...prev, currentGoal: { goalId: selectedGoal.id, goal: finalName, icon: selectedGoal.icon, amount: 0, years: 0, custom: selectedGoal.id === CUSTOM_GOAL_ID } }));
    goTo(3);
  }

  function handleGoToScreen4() {
    const amount = parseInputNumber(amountInput);
    if (!Number.isFinite(amount) || amount < 100) { setAmountError(copy.amountError); return; }
    setAmountError("");
    if (selectedYears === null) { setYearsError(copy.yearsError); return; }
    let years = 0;
    if (selectedYears === "custom") {
      years = Number.parseInt(customYears, 10);
      if (!Number.isFinite(years) || years < 1 || years > MAX_HORIZON_YEARS) { setYearsError(copy.yearsRangeError); return; }
    } else {
      years = selectedYears;
    }
    setYearsError("");
    const newGoal = { ...appState.currentGoal, amount, years };
    const nextGoals = editingGoalIndex === null
      ? [...appState.goals, newGoal]
      : appState.goals.map((goal, index) => index === editingGoalIndex ? newGoal : goal);

    setAppState(prev => ({ ...prev, goals: nextGoals }));
    calculateResultsForScenario(nextGoals, scenarioDraft);
    setActiveGoalIndex(editingGoalIndex === null ? nextGoals.length - 1 : editingGoalIndex);
    setEditingGoalIndex(null);
    goTo(4);
  }

  function handleAddAnother() {
    resetGoalDraft();
    setShowAssumptionsPanel(false);
    setAppState(prev => ({ ...prev, currentGoal: { goalId: "", goal: "", icon: "", amount: 0, years: 0, custom: false } }));
    goTo(2);
  }

  function handleRemoveGoal(i) {
    const remainingGoals = appState.goals.filter((_, index) => index !== i);
    setAppState(prev => ({ ...prev, goals: remainingGoals }));

    if (remainingGoals.length === 0) {
      setResults([]);
      setActiveGoalIndex(0);
      resetGoalDraft();
      goTo(2);
      return;
    }

    const nextActiveIndex = activeGoalIndex > i ? activeGoalIndex - 1 : Math.min(activeGoalIndex, remainingGoals.length - 1);
    setActiveGoalIndex(nextActiveIndex);
    setEditingGoalIndex(current => {
      if (current === null) return null;
      if (current === i) return null;
      return current > i ? current - 1 : current;
    });
    calculateResultsForScenario(remainingGoals, scenarioDraft);
  }

  function handleRestart() {
    setScreen(1); setAppState(INITIAL_STATE); setNameInput(""); setNameError(""); setSelectedGoal(null);
    setGoalError(""); setCustomGoal(""); setAmountInput(""); setAmountError(""); setSelectedYears(null); setYearsError(""); setCustomYears("");
    setResults([]); setActiveGoalIndex(0); setEditingGoalIndex(null);
    setScenarioDraft({ ...DEFAULT_SCENARIO }); setAppliedScenario({ ...DEFAULT_SCENARIO }); setCustomScenarioEnabled(false); setShowAssumptionsPanel(false);
    setTimeout(scrollTop, 50);
  }

  const activeResult = results[activeGoalIndex] || results[0] || null;

  return (
    <div className="app-shell">
      <div ref={topRef} />
      <div className="app-frame">
        {screen === 1 && (
          <div className={`screen-shell form-screen${navDir === "back" ? " nav-back" : ""}`}>
            <div className="top-row">
              <div className="top-placeholder" />
              <div className="top-controls"><ThemeToggle theme={theme} setTheme={setTheme} /><LocaleSwitch lang={lang} setLang={setLang} /></div>
            </div>
            <ProgressBar screen={screen} copy={copy} />
            <div className="screen-head">
              <div className="brand-kicker">{copy.appName}</div>
              <div className="big-title">{copy.nameTitleTop}<br />{copy.nameTitleBottom}</div>
              <div className="big-sub">{copy.introSub}</div>
            </div>
            <div className="name-wrap">
              <input
                className="ios-input"
                style={{ borderColor: nameError ? C.red : C.border, boxShadow: nameError ? "0 0 0 4px rgba(255,59,48,0.08)" : undefined }}
                type="text"
                placeholder={copy.namePlaceholder}
                maxLength={30}
                value={nameInput}
                onChange={event => { setNameInput(event.target.value); if (nameError) setNameError(""); }}
                onKeyDown={event => event.key === "Enter" && handleGoToScreen2()}
                autoComplete="given-name"
              />
            </div>
            {nameError && <div className="error-text">{nameError}</div>}
            <div className="bottom-actions">
              <button className="cta" onClick={handleGoToScreen2}>{copy.next}</button>
            </div>
          </div>
        )}

        {screen === 2 && (
          <div className={`screen-shell form-screen${navDir === "back" ? " nav-back" : ""}`}>
            <div className="top-row">
              <button className="back-btn" onClick={() => goTo(1)}><span className="chev">‹</span> {copy.back}</button>
              <div className="top-controls"><ThemeToggle theme={theme} setTheme={setTheme} /><LocaleSwitch lang={lang} setLang={setLang} /></div>
            </div>
            <ProgressBar screen={screen} copy={copy} />
            <div className="screen-head">
              <div className="big-title">{copy.goalTitleTop}<br />{copy.goalTitleBottom}</div>
              <div className="big-sub">{copy.goalSub(appState.name)}</div>
            </div>
            <div className="goal-list">
              {GOAL_TILES.map(t => {
                const isSel = selectedGoal?.id === t.id;
                return (
                  <button key={t.id} className={`goal-row ${isSel ? "sel" : ""}`} onClick={() => { setSelectedGoal(t); if (goalError) setGoalError(""); }}>
                    <span className="g-icon">{t.icon}</span>
                    <span className="g-copy">
                      <span className="g-lbl">{getGoalTileLabel(t, lang)}</span>
                      <span className="g-desc">{getGoalTileDescription(t, lang)}</span>
                    </span>
                    <span className="g-chk">✓</span>
                  </button>
                );
              })}
            </div>
            {selectedGoal?.id === CUSTOM_GOAL_ID && (
              <div className="custom-goal">
                <label className="field-label">{copy.customGoalLabel}</label>
                <input className="ios-input" type="text" placeholder={copy.customGoalPlaceholder} maxLength={40} value={customGoal} onChange={event => { setCustomGoal(event.target.value); if (goalError) setGoalError(""); }} autoFocus />
              </div>
            )}
            {goalError && <div className="error-text">{goalError}</div>}
            <div className="bottom-actions">
              <button className="cta" onClick={handleGoToScreen3}>{copy.next}</button>
            </div>
          </div>
        )}

        {screen === 3 && (
          <div className={`screen-shell form-screen${navDir === "back" ? " nav-back" : ""}`}>
            <div className="top-row">
              <button className="back-btn" onClick={() => goTo(2)}><span className="chev">‹</span> {copy.back}</button>
              <div className="top-controls"><ThemeToggle theme={theme} setTheme={setTheme} /><LocaleSwitch lang={lang} setLang={setLang} /></div>
            </div>
            <ProgressBar screen={screen} copy={copy} />
            <div className="screen-head">
              <div className="big-title">{copy.amountTitleTop}<br />{copy.amountTitleBottom}</div>
              <div className="big-sub">{getGoalDisplay(appState.currentGoal, lang)}</div>
            </div>
            <div className="amount-block">
              <div className="amount-hero">
                <input
                  className="amount-input"
                  style={amountError ? { color: "var(--red)" } : undefined}
                  type="text"
                  inputMode="numeric"
                  placeholder="10 000"
                  value={fmtInputNumber(amountInput)}
                  onChange={event => { setAmountInput(sanitizeIntegerInput(event.target.value)); if (amountError) setAmountError(""); }}
                  onKeyDown={event => event.key === "Enter" && handleGoToScreen4()}
                />
                <span className="amount-unit">PLN</span>
              </div>
              <div className="amount-hint">{copy.amountHint}</div>
            </div>
            {amountError && <div className="error-text">{amountError}</div>}
            <div className="segment-label">{copy.yearsPrompt}</div>
            <div className="seg">
              {TIME_OPTIONS.map(t => {
                const isSel = selectedYears === t.years;
                return (
                  <button key={String(t.years)} className={`sb ${isSel ? "on" : ""}`} onClick={() => { setSelectedYears(t.years); if (yearsError) setYearsError(""); }}>
                    {t.label}
                    <small>{getLocalized(t.unit, lang)}</small>
                  </button>
                );
              })}
            </div>
            {selectedYears === "custom" && (
              <div className="custom-years">
                <label className="field-label">{copy.customYearsLabel}</label>
                <input className="ios-input" type="number" placeholder="12" min={1} max={MAX_HORIZON_YEARS} value={customYears} onChange={event => { setCustomYears(event.target.value); if (yearsError) setYearsError(""); }} autoFocus />
              </div>
            )}
            {yearsError && <div className="error-text">{yearsError}</div>}
            <div className="bottom-actions">
              <button className="cta" onClick={handleGoToScreen4}>{copy.calculate}</button>
            </div>
          </div>
        )}

        {screen === 4 && (
          <div className={`screen-shell results-screen${navDir === "back" ? " nav-back" : ""}`}>
            <div className="top-row">
              <button className="back-btn" onClick={() => openGoalForEditing(activeGoalIndex)}><span className="chev">‹</span> {copy.changeData}</button>
              <div className="top-controls"><ThemeToggle theme={theme} setTheme={setTheme} /><LocaleSwitch lang={lang} setLang={setLang} /></div>
            </div>
            <ProgressBar screen={screen} copy={copy} />

            {results.length > 1 && (
              <div className="goal-switcher">
                {results.map((result, index) => (
                  <div key={`${result.goal.goalId || result.goal.goal}-${index}`} className="goal-switch-row">
                    <button className={`goal-switch ${index === activeGoalIndex ? "active" : ""}`} onClick={() => setActiveGoalIndex(index)}>
                      <span className="goal-switch-icon">{result.goal.icon}</span>
                      <span className="goal-switch-copy">
                        <span className="goal-switch-title">{getGoalDisplay(result.goal, lang)}</span>
                        <span className="goal-switch-meta">{fmtShort(result.goal.amount)} · {yearsLabel(result.goal.years, lang)}</span>
                      </span>
                      <span className="goal-switch-win">{getProductShortName(result.winner.product, lang)}</span>
                    </button>
                    <button className="goal-switch-remove" onClick={() => handleRemoveGoal(index)} aria-label={copy.removeGoal} title={copy.removeGoal}>×</button>
                  </div>
                ))}
              </div>
            )}

            {activeResult && <GoalCard key={`${activeResult.goal.goalId || activeResult.goal.goal}-${activeGoalIndex}`} goal={activeResult.goal} productResults={activeResult.productResults} winner={activeResult.winner} runnerUp={activeResult.runnerUp} thirdPlace={activeResult.thirdPlace} copy={copy} lang={lang} />}

            {!showAssumptionsPanel && (
              <button className="assumption-trigger" onClick={() => setShowAssumptionsPanel(true)} aria-label={copy.assumptionsTitle} title={copy.assumptionsTitle}>
                <span className="assumption-trigger-icon" aria-hidden="true">⚙</span>
              </button>
            )}

            {showAssumptionsPanel && (
              <>
                <div className="sheet-backdrop" onClick={() => setShowAssumptionsPanel(false)} />
                <aside className="sheet">
                  <div className="sheet-head">
                    <div>
                      <div className="sheet-title">{copy.assumptionsTitle}</div>
                      <div className="sheet-copy">{customScenarioEnabled ? copy.assumptionsEnabledCopy : copy.assumptionsDisabledCopy}</div>
                    </div>
                    <button className="icon-btn" onClick={() => setShowAssumptionsPanel(false)} aria-label={copy.closePanel} title={copy.closePanel}>×</button>
                  </div>

                  <div className="assumption-summary-head">
                    <div className="assumption-summary-title">{copy.assumptionsTitle}</div>
                    <button className={`scenario-toggle ${customScenarioEnabled ? "on" : ""}`} onClick={handleScenarioToggle} aria-pressed={customScenarioEnabled}>
                      <span className="scenario-toggle-label">{copy.assumptionsToggle}</span>
                      <span className="scenario-track" aria-hidden="true"><span className="scenario-knob" /></span>
                    </button>
                  </div>
                  <AssumptionsEditor values={customScenarioEnabled ? scenarioDraft : appliedScenario} editable={customScenarioEnabled} onChange={updateScenarioField} copy={copy} lang={lang} />
                </aside>
              </>
            )}

            <div className="bottom-actions" style={{ marginTop: 14, paddingTop: 0 }}>
              <button className="cta" onClick={handleAddAnother}>{copy.addAnother}</button>
              <button className="cta secondary" onClick={handleRestart}>{copy.startOver}</button>
            </div>

            <div className="disclaimer">
              {copy.disclaimer}
            </div>
            <div className="result-links">
              <span className="author-note">{copy.createdBy}</span>
              <a className="info-link" href="https://patrykkaminiecki.github.io/" target="_blank" rel="noopener noreferrer">Portfolio</a>
              <a className="info-link" href="https://www.linkedin.com/in/patrykkaminiecki/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
window.__calculatorDebug = { ALL_PRODUCTS, BOND_PRODUCTS, ACCOUNT_PRODUCT, DEFAULT_SCENARIO, compareProducts, calcProduct };
root.render(<App />);
</script>
</body>
</html>
